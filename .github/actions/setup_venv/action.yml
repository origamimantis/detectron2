name: "Setup Virtual Env"
env:
  BASH_ENV: aa
runs:
  using: composite
  steps:
  - name: Install Dependencies
    shell: bash
    #working-directory: $HOME
    run: |
      python -m venv ~/venv
      echo ". ~/venv/bin/activate" >> $BASH_ENV
      . ~/venv/bin/activate
      python --version
      which python
      which pip
      pip install --upgrade pip

name: "Setup Virtual Env"
runs:
  using: composite
  steps:
  - name: Install Dependencies
    shell: bash
    #working-directory: $HOME
    run: |
      python -m venv ~/venv
      ls ~
      realpath ~
      # BASH_ENV does not exist outdife of circleci.
      # the goal is to source the venv in future jobs,
      # so add it as a script to /etc/profile.d
      echo ". ~/venv/bin/activate" >> /etc/profile.d/detectron2_activate_venv.sh
      . ~/venv/bin/activate
      python --version
      which python
      which pip
      pip install --upgrade pip
